<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>BD Studio</title>

    <link
        rel="stylesheet"
        href="./app.css">

</head>

<body>

    <!-- ====================================== -->
    <!-- Top Bar                               -->
    <!-- ====================================== -->

    <header class="topbar">

        <div class="logo">

            BD Studio

        </div>

        <div
            class="version"
            id="app-version">

        </div>

    </header>

    <!-- ====================================== -->
    <!-- Workspace                              -->
    <!-- ====================================== -->

    <main class="workspace">

        <!-- Sidebar -->

        <aside class="sidebar">

            <button>Dashboard</button>

            <button>Explorer</button>

            <button>Packages</button>

            <button>Components</button>

            <button>Blueprints</button>

            <button>Documentation</button>

            <button>Settings</button>

        </aside>

        <!-- Explorer -->

        <section
            id="explorer-panel"
            class="explorer">

            <h2>Explorer</h2>

        </section>

        <!-- Viewer -->

        <section
            id="content"
            class="content">

        </section>

        <!-- Inspector -->

        <aside
            id="inspector"
            class="inspector">

            <h2>Inspector</h2>

            <p>Select an item.</p>

        </aside>

    </main>

    <!-- ====================================== -->
    <!-- Status Bar                             -->
    <!-- ====================================== -->

    <footer class="statusbar">

        <div id="kernel-status">

            Kernel: Loading...

        </div>

        <div>

            BD Universe

        </div>

    </footer>

    <script
        type="module"
        src="./app.js">

    </script>

</body>

</html>
