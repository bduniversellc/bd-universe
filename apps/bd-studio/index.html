<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>BD Studio</title>

    <link
        rel="stylesheet"
        href="./app.css">

</head>

<body>

    <!-- ======================================
         Header
    ======================================= -->

    <header class="topbar">

        <div class="logo">

            BD Studio

        </div>

        <div
            class="version"
            id="app-version">

            v0.8.0

        </div>

    </header>

    <!-- ======================================
         Workspace
    ======================================= -->

    <div class="workspace">

        <!-- Sidebar -->

        <aside class="sidebar">

            <button>Dashboard</button>

            <button>Explorer</button>

            <button>Packages</button>

            <button>Components</button>

            <button>Blueprints</button>

            <button>Documentation</button>

            <button>Settings</button>

        </aside>

        <!-- Content -->

        <main
            class="content"
            id="content">

        </main>

    </div>

    <!-- ======================================
         Status Bar
    ======================================= -->

    <footer class="statusbar">

        <span id="kernel-status">

            Kernel: Starting...

        </span>

    </footer>

    <script
        type="module"
        src="./app.js"></script>

</body>

</html>
